server {
    listen 80;
    server_name winbig.bedriften.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name winbig.bedriften.xyz;

    ssl_certificate /etc/letsencrypt/live/winbig.bedriften.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/winbig.bedriften.xyz/privkey.pem;

    root /var/www/html;
    index index.html;

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Static assets - must come before catch-all
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mp4|webm|ogg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback - must be last
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}