server {
    listen 80;
    server_name winbig.bedriften.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name winbig.bedriften.xyz;
    root /var/www/winbig;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/api.winbig.bedriften.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.winbig.bedriften.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Never cache index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Cache hashed assets forever
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
