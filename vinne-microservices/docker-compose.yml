  service-game:
    build:
      context: .
      dockerfile: ./services/service-game/Dockerfile.dev
    ports:
      - "8090:8080"
      - "51053:51053"
    environment:
      SERVICE_NAME: service-game
      ENVIRONMENT: local
      SERVER_PORT: 51053
      METRICS_PORT: 8080
      DATABASE_URL: postgresql://game:game123@service-game-db:5432/game_service?sslmode=disable
      DATABASE_HOST: service-game-db
      DATABASE_PORT: 5432
      DATABASE_USER: game
      DATABASE_PASSWORD: game123
      DATABASE_NAME: game_service
      REDIS_HOST: service-game-redis
      REDIS_PORT: 6379
      REDIS_URL: redis://service-game-redis:6379/0
      SHARED_REDIS_HOST: redis-shared
      SHARED_REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      JAEGER_ENDPOINT: http://jaeger:4318
      TRACING_JAEGER_ENDPOINT: http://jaeger:4318
      SCHEDULER_ENABLED: "true"
      SCHEDULER_INTERVAL: 1m
      SCHEDULER_WINDOW_MINUTES: 2
      SCHEDULER_TIMEZONE: UTC
      SERVICES_DRAW_HOST: service-draw
      SERVICES_DRAW_PORT: 51060
    networks:
      - randco-net
    depends_on:
      - service-game-db
      - service-game-redis
      - redis-shared
      - kafka
      - jaeger

  # Draw Service Database & Cache
  service-draw-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: draw_service
      POSTGRES_USER: draw_service
      POSTGRES_PASSWORD: draw_service123
    volumes:
      - postgres-draw-data:/var/lib/postgresql/data
