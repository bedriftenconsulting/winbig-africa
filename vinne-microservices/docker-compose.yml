version: '3.9'

networks:
  randco-net:
    driver: bridge

volumes:
  go-mod-cache:
  postgres-admin-mgmt-data:
  postgres-agent-data:
  postgres-agent-mgmt-data:
  postgres-wallet-data:
  postgres-terminal-data:
  postgres-game-data:
  postgres-payment-data:
  postgres-draw-data:
  postgres-ticket-data:
  postgres-notification-data:
  redis-admin-mgmt-data:
  redis-payment-data:
  redis-agent-data:
  redis-agent-mgmt-data:
  redis-wallet-data:
  redis-terminal-data:
  redis-game-data:
  redis-draw-data:
  redis-ticket-data:
  redis-notification-data:
  redis-shared-data:
  kafka-data:
  minio-data:
  jaeger-data:
  prometheus-data:
  grafana-data:
  postgres-player-data:
  redis-player-data:

services:
  # Infrastructure Services
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Collector
      - "4318:4318"    # OTLP HTTP
      - "4317:4317"    # OTLP gRPC
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: :9411
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - randco-net

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - randco-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - randco-net

  # Kafka (KRaft mode - no ZooKeeper)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - randco-net

  # Shared Redis for session store
  redis-shared:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-shared-data:/data
    command: redis-server --appendonly yes
    networks:
      - randco-net

  # MinIO - local S3-compatible object storage for game logos
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - randco-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # MinIO bucket initializer - creates the bucket on first run
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/vinne-game-assets;
      mc anonymous set public local/vinne-game-assets;
      echo 'MinIO bucket ready';
      "
    networks:
      - randco-net

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile.dev
    ports:
      - "4000:4000"
    environment:
      SERVER_PORT: 4000
      ENVIRONMENT: development
      SERVICES_ADMIN_MANAGEMENT_HOST: service-admin-management
      SERVICES_ADMIN_MANAGEMENT_PORT: 51057
      SERVICES_AGENT_AUTH_HOST: service-agent-auth
      SERVICES_AGENT_AUTH_PORT: 51052
      SERVICES_AGENT_MANAGEMENT_HOST: service-agent-management
      SERVICES_AGENT_MANAGEMENT_PORT: 51056
      SERVICES_WALLET_HOST: service-wallet
      SERVICES_WALLET_PORT: 51059
      SERVICES_TERMINAL_HOST: service-terminal
      SERVICES_TERMINAL_PORT: 51054
      SERVICES_PAYMENT_HOST: service-payment
      SERVICES_PAYMENT_PORT: 51061
      SERVICES_GAME_HOST: service-game
      SERVICES_GAME_PORT: 51053
      SERVICES_DRAW_HOST: service-draw
      SERVICES_DRAW_PORT: 51060
      SERVICES_TICKET_HOST: service-ticket
      SERVICES_TICKET_PORT: 51062
      SERVICES_NOTIFICATION_HOST: service-notification
      SERVICES_NOTIFICATION_PORT: 51063
      SERVICES_PLAYER_HOST: service-player
      SERVICES_PLAYER_PORT: 51064
      REDIS_HOST: redis-shared
      REDIS_PORT: 6379
      SHARED_REDIS_HOST: redis-shared
      SHARED_REDIS_PORT: 6379
      SECURITY_ALLOWED_ORIGINS: "http://localhost:8080,http://localhost:8081,http://localhost:5173,http://localhost:5174,http://localhost:3000,http://localhost:6176,http://localhost:6177,http://localhost:6178,http://localhost:9000,https://winbig.bedriften.xyz,https://admin.winbig.bedriften.xyz,https://api.winbig.bedriften.xyz"
      JAEGER_ENDPOINT: http://jaeger:4318
      TRACING_JAEGER_ENDPOINT: http://jaeger:4318
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      # Storage (MinIO for local dev)
      STORAGE_PROVIDER: spaces
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_REGION: us-east-1
      STORAGE_BUCKET: vinne-game-assets
      STORAGE_ACCESS_KEY_ID: minioadmin
      STORAGE_SECRET_ACCESS_KEY: minioadmin
      STORAGE_CDN_ENDPOINT: http://localhost:9000/vinne-game-assets
      STORAGE_FORCE_PATH_STYLE: "true"
    networks:
      - randco-net
    depends_on:
      - service-admin-management
      - service-agent-auth
      - service-agent-management
      - service-wallet
      - service-terminal
      - service-payment
      - redis-shared
      - jaeger
      - minio

  # Admin Management Service Database & Cache (includes auth functionality)
  service-admin-management-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: admin_management
      POSTGRES_USER: admin_mgmt
      POSTGRES_PASSWORD: admin_mgmt123
    volumes:
      - postgres-admin-mgmt-data:/var/lib/postgresql/data
      - ./services/service-admin-management/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5437:5432"
    networks:
      - randco-net

  service-admin-management-redis:
    image: redis:7.4-alpine
    volumes:
      - redis-admin-mgmt-data:/data
    ports:
      - "6384:6379"
    command: redis-server --appendonly yes
    networks:
      - randco-net

  service-admin-management:
    build:
      context: .
      dockerfile: ./services/service-admin-management/Dockerfile.dev
    ports:
      - "8085:8080"  # HTTP port for metrics/health
      - "51057:51057"  # gRPC port
    environment:
      SERVICE_NAME: service-admin-management
      DATABASE_HOST: service-admin-management-db
      DATABASE_PORT: 5432
      DATABASE_USER: admin_mgmt
      DATABASE_PASSWORD: admin_mgmt123
      DATABASE_NAME: admin_management
      REDIS_HOST: service-admin-management-redis
      REDIS_PORT: 6379
      SHARED_REDIS_HOST: redis-shared
      SHARED_REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      TRACING_JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      SERVER_PORT: 51057
      METRICS_PORT: 9092
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      DATABASE_URL: postgresql://admin_mgmt:admin_mgmt123@service-admin-management-db:5432/admin_management?sslmode=disable
      SECURITY_ACCESS_TOKEN_EXPIRY: 24h
      SECURITY_REFRESH_TOKEN_EXPIRY: 168h
      SECURITY_SESSION_EXPIRY: 168h
      SECURITY_JWT_ISSUER: randco-admin-management
    networks:
      - randco-net
    depends_on:
      - service-admin-management-db
      - service-admin-management-redis
      - redis-shared
      - kafka
      - jaeger

  # Agent Auth Service Database & Cache
  service-agent-auth-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: agent_auth
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent123
    volumes:
      - postgres-agent-data:/var/lib/postgresql/data
      - ./services/service-agent-auth/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5434:5432"
    networks:
      - randco-net

  service-agent-auth-redis:
    image: redis:7.4-alpine
    volumes:
      - redis-agent-data:/data
    ports:
      - "6381:6379"
    command: redis-server --appendonly yes
    networks:
      - randco-net

  service-agent-auth:
    build:
      context: .
      dockerfile: ./services/service-agent-auth/Dockerfile.dev
    ports:
      - "51052:51052"
    environment:
      SERVICE_NAME: service-agent-auth
      SERVER_PORT: 51052
      DATABASE_HOST: service-agent-auth-db
      DATABASE_PORT: 5432
      DATABASE_USER: agent
      DATABASE_PASSWORD: agent123
      DATABASE_NAME: agent_auth
      REDIS_HOST: service-agent-auth-redis
      REDIS_PORT: 6379
      SHARED_REDIS_HOST: redis-shared
      SHARED_REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      TRACING_JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      DATABASE_URL: postgresql://agent:agent123@service-agent-auth-db:5432/agent_auth?sslmode=disable
    networks:
      - randco-net
    depends_on:
      - service-agent-auth-db
      - service-agent-auth-redis
      - redis-shared
      - kafka
      - jaeger

  # Agent Management Service Database & Cache
  service-agent-management-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: agent_management
      POSTGRES_USER: agent_mgmt
      POSTGRES_PASSWORD: agent_mgmt123
    volumes:
      - postgres-agent-mgmt-data:/var/lib/postgresql/data
      - ./services/service-agent-management/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5435:5432"
    networks:
      - randco-net

  service-agent-management-redis:
    image: redis:7.4-alpine
    volumes:
      - redis-agent-mgmt-data:/data
    ports:
      - "6382:6379"
    command: redis-server --appendonly yes
    networks:
      - randco-net

  service-agent-management:
    build:
      context: .
      dockerfile: ./services/service-agent-management/Dockerfile.dev
    ports:
      - "8086:8080"  # HTTP port for metrics/health
      - "51056:51056"  # gRPC port
    environment:
      SERVICE_NAME: service-agent-management
      DATABASE_HOST: service-agent-management-db
      DATABASE_PORT: 5432
      DATABASE_USER: agent_mgmt
      DATABASE_PASSWORD: agent_mgmt123
      DATABASE_NAME: agent_management
      REDIS_HOST: service-agent-management-redis
      REDIS_PORT: 6379
      SHARED_REDIS_HOST: redis-shared
      SHARED_REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      TRACING_JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      SERVER_PORT: 51056
      METRICS_PORT: 8080
      SERVICES_AGENT_AUTH_SERVICE: service-agent-auth:51052
      SERVICES_WALLET_SERVICE: service-wallet:51059
      SERVICES_COMMISSION_SERVICE: service-commission:51062
      SERVICES_NOTIFICATION_SERVICE: service-notification:51063
      DATABASE_URL: postgresql://agent_mgmt:agent_mgmt123@service-agent-management-db:5432/agent_management?sslmode=disable
    networks:
      - randco-net
    depends_on:
      - service-agent-management-db
      - service-agent-management-redis
      - redis-shared
      - kafka
      - jaeger

  # Wallet Service Database & Cache
  service-wallet-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: wallet_service
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: wallet123
    volumes:
      - postgres-wallet-data:/var/lib/postgresql/data
      - ./services/service-wallet/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5438:5432"
    networks:
      - randco-net

  service-wallet-redis:
    image: redis:7.4-alpine
    volumes:
      - redis-wallet-data:/data
    ports:
      - "6385:6379"
    command: redis-server --appendonly yes
    networks:
      - randco-net

  service-wallet:
    build:
      context: .
      dockerfile: ./services/service-wallet/Dockerfile.dev
    ports:
      - "8087:8080"  # HTTP port for metrics/health
      - "51059:51059"  # gRPC port
    environment:
      SERVICE_NAME: service-wallet
      DATABASE_HOST: service-wallet-db
      DATABASE_PORT: 5432
      DATABASE_USER: wallet
      DATABASE_PASSWORD: wallet123
      DATABASE_NAME: wallet_service
      DATABASE_URL: postgresql://wallet:wallet123@service-wallet-db:5432/wallet_service?sslmode=disable
      REDIS_HOST: service-wallet-redis
      REDIS_PORT: 6379
      REDIS_URL: redis://service-wallet-redis:6379/0
      SHARED_REDIS_HOST: redis-shared
      SHARED_REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      JAEGER_ENDPOINT: http://jaeger:4318
      TRACING_JAEGER_ENDPOINT: http://jaeger:4318
      SERVER_PORT: 51059
      METRICS_PORT: 8080
    networks:
      - randco-net
    depends_on:
      - service-wallet-db
      - service-wallet-redis
      - redis-shared
      - kafka
      - jaeger

  # Terminal Management Service Database & Cache
  service-terminal-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: terminal_service
      POSTGRES_USER: terminal
      POSTGRES_PASSWORD: terminal123
    volumes:
      - postgres-terminal-data:/var/lib/postgresql/data
      - ./services/service-terminal/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5439:5432"
    networks:
