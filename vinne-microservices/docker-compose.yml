    command: redis-server --appendonly yes
    networks:
      - randco-net

  service-terminal:
    build:
      context: .
      dockerfile: ./services/service-terminal/Dockerfile.dev
    ports:
      - "8088:8080"  # HTTP port for metrics/health
      - "51054:51054"  # gRPC port
    environment:
      SERVICE_NAME: service-terminal
      DATABASE_HOST: service-terminal-db
      DATABASE_PORT: 5432
      DATABASE_USER: terminal
      DATABASE_PASSWORD: terminal123
      DATABASE_NAME: terminal_service
      DATABASE_URL: postgresql://terminal:terminal123@service-terminal-db:5432/terminal_service?sslmode=disable
      REDIS_HOST: service-terminal-redis
      REDIS_PORT: 6379
      REDIS_URL: redis://service-terminal-redis:6379/0
      SHARED_REDIS_HOST: redis-shared
      SHARED_REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      JAEGER_ENDPOINT: http://jaeger:4318
      TRACING_JAEGER_ENDPOINT: http://jaeger:4318
      SERVER_PORT: 51054
      METRICS_PORT: 8080
    networks:
      - randco-net
    depends_on:
      - service-terminal-db
      - service-terminal-redis
      - redis-shared
      - kafka
      - jaeger

  # Payment Service Database & Cache
  service-payment-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: payment_service
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment123
    volumes:
      - postgres-payment-data:/var/lib/postgresql/data
      - ./services/service-payment/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5440:5432"
    networks:
      - randco-net

  service-payment-redis:
    image: redis:7.4-alpine
    volumes:
      - redis-payment-data:/data
    ports:
      - "6387:6379"
    command: redis-server --appendonly yes
    networks:
      - randco-net

  service-payment:
    build:
      context: .
      dockerfile: ./services/service-payment/Dockerfile.dev
    ports:
      - "8089:8080"  # HTTP port for metrics/health
      - "51061:51061"  # gRPC port
    environment:
      SERVICE_NAME: service-payment
      DATABASE_HOST: service-payment-db
      DATABASE_PORT: 5432
      DATABASE_USER: payment
      DATABASE_PASSWORD: payment123
      DATABASE_NAME: payment_service
      DATABASE_URL: postgresql://payment:payment123@service-payment-db:5432/payment_service?sslmode=disable
      REDIS_HOST: service-payment-redis
      REDIS_PORT: 6379
      REDIS_URL: redis://service-payment-redis:6379/0
      SHARED_REDIS_HOST: redis-shared
      SHARED_REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      JAEGER_ENDPOINT: http://jaeger:4318
      TRACING_JAEGER_ENDPOINT: http://jaeger:4318
      SERVER_PORT: 51061
      METRICS_PORT: 8080
      PAYMENT_TEST_MODE: "true"
      PAYMENT_DEFAULT_CURRENCY: GHS
      PAYMENT_MAX_AMOUNT: 100000000
      PAYMENT_MIN_AMOUNT: 50
      PROVIDERS_MTN_ENABLED: "true"
      PROVIDERS_TELECEL_ENABLED: "true"
      PROVIDERS_AIRTELTIGO_ENABLED: "true"
      PROVIDERS_BANKS_ENABLED: "true"
    networks:
      - randco-net
    depends_on:
      - service-payment-db
      - service-payment-redis
      - redis-shared
      - kafka
      - jaeger

  # Game Service Database & Cache
  service-game-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: game_service
      POSTGRES_USER: game
      POSTGRES_PASSWORD: game123
    volumes:
