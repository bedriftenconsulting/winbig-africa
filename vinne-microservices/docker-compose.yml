    ports:
      - "5436:5432"
    networks:
      - randco-net

  service-draw-redis:
    image: redis:7.4-alpine
    volumes:
      - redis-draw-data:/data
    ports:
      - "6383:6379"
    command: redis-server --appendonly yes
    networks:
      - randco-net

  service-draw:
    build:
      context: .
      dockerfile: ./services/service-draw/Dockerfile.dev
    ports:
      - "8091:8080"
      - "51060:51060"
    environment:
      SERVICE_NAME: service-draw
      ENVIRONMENT: local
      SERVER_PORT: 51060
      METRICS_PORT: 8080
      DATABASE_URL: postgresql://draw_service:draw_service123@service-draw-db:5432/draw_service?sslmode=disable
      DATABASE_HOST: service-draw-db
      DATABASE_PORT: 5432
      DATABASE_USER: draw_service
      DATABASE_PASSWORD: draw_service123
      DATABASE_NAME: draw_service
      REDIS_HOST: service-draw-redis
      REDIS_PORT: 6379
      REDIS_URL: redis://service-draw-redis:6379/0
      SHARED_REDIS_HOST: redis-shared
      SHARED_REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      JAEGER_ENDPOINT: http://jaeger:4318
      TRACING_JAEGER_ENDPOINT: http://jaeger:4318
      VALIDATION_NLA_API_ENDPOINT: http://localhost:18080/mock-nla
      VALIDATION_VALIDATION_TIMEOUT: 30s
      GAME_SERVICE_URL: service-game:51053
      SERVICES_TICKET_HOST: service-ticket
      SERVICES_TICKET_PORT: "51062"
    networks:
      - randco-net
    depends_on:
      - service-draw-db
      - service-draw-redis
      - redis-shared
      - kafka
      - jaeger

  # Ticket Service Database & Cache
  service-ticket-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ticket_service
      POSTGRES_USER: ticket
      POSTGRES_PASSWORD: ticket123
    volumes:
