version: '3.9'

networks:
  randco-net:
    driver: bridge

volumes:
  postgres-admin-mgmt-data:
  postgres-agent-data:
  postgres-agent-mgmt-data:
  postgres-wallet-data:
  postgres-terminal-data:
  postgres-game-data:
  postgres-payment-data:
  postgres-draw-data:
  postgres-ticket-data:
  postgres-notification-data:
  postgres-player-data:
  redis-admin-mgmt-data:
  redis-payment-data:
  redis-agent-data:
  redis-agent-mgmt-data:
  redis-wallet-data:
  redis-terminal-data:
  redis-game-data:
  redis-draw-data:
  redis-ticket-data:
  redis-notification-data:
  redis-player-data:
  redis-shared-data:
  kafka-data:
  minio-data:
  jaeger-data:
  prometheus-data:
  grafana-data:

services:
  # Infrastructure Services
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "14268:14268"
      - "4318:4318"
      - "4317:4317"
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: :9411
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - randco-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - randco-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - randco-net
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - randco-net
    restart: unless-stopped

  redis-shared:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-shared-data:/data
    command: redis-server --appendonly yes
    networks:
      - randco-net
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - randco-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/vinne-game-assets;
      mc anonymous set public local/vinne-game-assets;
      echo 'MinIO bucket ready';
      "
    networks:
      - randco-net

  # API Gateway
  api-gateway:
    image: ghcr.io/nexalabshq/rand-api-gateway:main
    ports:
      - "4000:4000"
    environment:
      SERVER_PORT: 4000
      ENVIRONMENT: production
      SERVICES_ADMIN_MANAGEMENT_HOST: service-admin-management
      SERVICES_ADMIN_MANAGEMENT_PORT: 51057
      SERVICES_AGENT_AUTH_HOST: service-agent-auth
      SERVICES_AGENT_AUTH_PORT: 51052
      SERVICES_AGENT_MANAGEMENT_HOST: service-agent-management
      SERVICES_AGENT_MANAGEMENT_PORT: 51056
      SERVICES_WALLET_HOST: service-wallet
      SERVICES_WALLET_PORT: 51059
      SERVICES_TERMINAL_HOST: service-terminal
      SERVICES_TERMINAL_PORT: 51054
      SERVICES_PAYMENT_HOST: service-payment
      SERVICES_PAYMENT_PORT: 51061
      SERVICES_GAME_HOST: service-game
      SERVICES_GAME_PORT: 51053
      SERVICES_DRAW_HOST: service-draw
      SERVICES_DRAW_PORT: 51060
      SERVICES_TICKET_HOST: service-ticket
      SERVICES_TICKET_PORT: 51062
      SERVICES_NOTIFICATION_HOST: service-notification
      SERVICES_NOTIFICATION_PORT: 51063
      SERVICES_PLAYER_HOST: service-player
      SERVICES_PLAYER_PORT: 51064
      REDIS_HOST: redis-shared
      REDIS_PORT: 6379
      SHARED_REDIS_HOST: redis-shared
      SHARED_REDIS_PORT: 6379
      SECURITY_ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      JAEGER_ENDPOINT: http://jaeger:4318
      TRACING_JAEGER_ENDPOINT: http://jaeger:4318
      JWT_SECRET: ${JWT_SECRET}
      STORAGE_PROVIDER: spaces
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_REGION: us-east-1
      STORAGE_BUCKET: vinne-game-assets
      STORAGE_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      STORAGE_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      STORAGE_CDN_ENDPOINT: ${CDN_ENDPOINT:-http://localhost:9000/vinne-game-assets}
      STORAGE_FORCE_PATH_STYLE: "true"
    networks:
      - randco-net
    depends_on:
      - service-admin-management
      - service-agent-auth
      - service-agent-management
      - service-wallet
      - service-terminal
      - service-payment
      - redis-shared
      - jaeger
      - minio
    restart: unless-stopped

  # Admin Management
  service-admin-management-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: admin_management
      POSTGRES_USER: admin_mgmt
      POSTGRES_PASSWORD: ${ADMIN_MGMT_DB_PASSWORD:-admin_mgmt123}
    volumes:
      - postgres-admin-mgmt-data:/var/lib/postgresql/data
      - ./services/service-admin-management/migrations:/docker-entrypoint-initdb.d
    networks:
      - randco-net
    restart: unless-stopped

  service-admin-management-redis:
    image: redis:7.4-alpine
    volumes:
      - redis-admin-mgmt-data:/data
    command: redis-server --appendonly yes
    networks:
      - randco-net
    restart: unless-stopped

  service-admin-management:
    image: ghcr.io/nexalabshq/rand-admin-management:main
    ports:
      - "51057:51057"
    environment:
      SERVICE_NAME: service-admin-management
      DATABASE_HOST: service-admin-management-db
      DATABASE_PORT: 5432
      DATABASE_USER: admin_mgmt
      DATABASE_PASSWORD: ${ADMIN_MGMT_DB_PASSWORD:-admin_mgmt123}
      DATABASE_NAME: admin_management
      DATABASE_URL: postgresql://admin_mgmt:${ADMIN_MGMT_DB_PASSWORD:-admin_mgmt123}@service-admin-management-db:5432/admin_management?sslmode=disable
      REDIS_HOST: service-admin-management-redis
      REDIS_PORT: 6379
      SHARED_REDIS_HOST: redis-shared
      SHARED_REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      TRACING_JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      SERVER_PORT: 51057
      JWT_SECRET: ${JWT_SECRET}
      SECURITY_ACCESS_TOKEN_EXPIRY: 24h
      SECURITY_REFRESH_TOKEN_EXPIRY: 168h
      SECURITY_SESSION_EXPIRY: 168h
      SECURITY_JWT_ISSUER: randco-admin-management
    networks:
      - randco-net
    depends_on:
      - service-admin-management-db
      - service-admin-management-redis
      - redis-shared
      - kafka
      - jaeger
    restart: unless-stopped

  # Agent Auth
  service-agent-auth-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: agent_auth
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${AGENT_DB_PASSWORD:-agent123}
    volumes:
      - postgres-agent-data:/var/lib/postgresql/data
      - ./services/service-agent-auth/migrations:/docker-entrypoint-initdb.d
    networks:
      - randco-net
    restart: unless-stopped

  service-agent-auth-redis:
    image: redis:7.4-alpine
    volumes:
      - redis-agent-data:/data
    command: redis-server --appendonly yes
    networks:
      - randco-net
    restart: unless-stopped

  service-agent-auth:
    image: ghcr.io/nexalabshq/rand-agent-auth:main
    ports:
      - "51052:51052"
    environment:
      SERVICE_NAME: service-agent-auth
      SERVER_PORT: 51052
      DATABASE_HOST: service-agent-auth-db
      DATABASE_PORT: 5432
      DATABASE_USER: agent
      DATABASE_PASSWORD: ${AGENT_DB_PASSWORD:-agent123}
      DATABASE_NAME: agent_auth
      DATABASE_URL: postgresql://agent:${AGENT_DB_PASSWORD:-agent123}@service-agent-auth-db:5432/agent_auth?sslmode=disable
      REDIS_HOST: service-agent-auth-redis
      REDIS_PORT: 6379
      SHARED_REDIS_HOST: redis-shared
      SHARED_REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      TRACING_JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - randco-net
    depends_on:
      - service-agent-auth-db
      - service-agent-auth-redis
      - redis-shared
      - kafka
      - jaeger
    restart: unless-stopped

  # Agent Management
  service-agent-management-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: agent_management
      POSTGRES_USER: agent_mgmt
      POSTGRES_PASSWORD: ${AGENT_MGMT_DB_PASSWORD:-agent_mgmt123}
    volumes:
      - postgres-agent-mgmt-data:/var/lib/postgresql/data
      - ./services/service-agent-management/migrations:/docker-entrypoint-initdb.d
    networks:
      - randco-net
    restart: unless-stopped

  service-agent-management-redis:
    image: redis:7.4-alpine
    volumes:
      - redis-agent-mgmt-data:/data
    command: redis-server --appendonly yes
    networks:
      - randco-net
    restart: unless-stopped

  service-agent-management:
    image: ghcr.io/nexalabshq/rand-agent-management:main
    ports:
      - "51056:51056"
    environment:
      SERVICE_NAME: service-agent-management
      DATABASE_HOST: service-agent-management-db
      DATABASE_PORT: 5432
      DATABASE_USER: agent_mgmt
      DATABASE_PASSWORD: ${AGENT_MGMT_DB_PASSWORD:-agent_mgmt123}
      DATABASE_NAME: agent_management
      DATABASE_URL: postgresql://agent_mgmt:${AGENT_MGMT_DB_PASSWORD:-agent_mgmt123}@service-agent-management-db:5432/agent_management?sslmode=disable
      REDIS_HOST: service-agent-management-redis
      REDIS_PORT: 6379
      SHARED_REDIS_HOST: redis-shared
      SHARED_REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      TRACING_JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      SERVER_PORT: 51056
      SERVICES_AGENT_AUTH_SERVICE: service-agent-auth:51052
      SERVICES_WALLET_SERVICE: service-wallet:51059
      SERVICES_NOTIFICATION_SERVICE: service-notification:51063
    networks:
      - randco-net
    depends_on:
      - service-agent-management-db
      - service-agent-management-redis
      - redis-shared
      - kafka
      - jaeger
    restart: unless-stopped

  # Wallet
  service-wallet-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: wallet_service
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: ${WALLET_DB_PASSWORD:-wallet123}
    volumes:
      - postgres-wallet-data:/var/lib/postgresql/data
      - ./services/service-wallet/migrations:/docker-entrypoint-initdb.d
    networks:
      - randco-net
    restart: unless-stopped

  service-wallet-redis:
    image: redis:7.4-alpine
    volumes:
      - redis-wallet-data:/data
    command: redis-server --appendonly yes
    networks:
      - randco-net
    restart: unless-stopped

  service-wallet:
    image: ghcr.io/nexalabshq/rand-wallet:main
    ports:
      - "51059:51059"
    environment:
      SERVICE_NAME: service-wallet
      DATABASE_HOST: service-wallet-db
      DATABASE_PORT: 5432
      DATABASE_USER: wallet
      DATABASE_PASSWORD: ${WALLET_DB_PASSWORD:-wallet123}
      DATABASE_NAME: wallet_service
      DATABASE_URL: postgresql://wallet:${WALLET_DB_PASSWORD:-wallet123}@service-wallet-db:5432/wallet_service?sslmode=disable
      REDIS_HOST: service-wallet-redis
      REDIS_PORT: 6379
      REDIS_URL: redis://service-wallet-redis:6379/0
      SHARED_REDIS_HOST: redis-shared
      SHARED_REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      JAEGER_ENDPOINT: http://jaeger:4318
      TRACING_JAEGER_ENDPOINT: http://jaeger:4318
      SERVER_PORT: 51059
    networks:
      - randco-net
    depends_on:
      - service-wallet-db
      - service-wallet-redis
      - redis-shared
      - kafka
      - jaeger
    restart: unless-stopped

  # Terminal
  service-terminal-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: terminal_service
      POSTGRES_USER: terminal
      POSTGRES_PASSWORD: ${TERMINAL_DB_PASSWORD:-terminal123}
    volumes:
      - postgres-terminal-data:/var/lib/postgresql/data
      - ./services/service-terminal/migrations:/docker-entrypoint-initdb.d
    networks:
      - randco-net
    restart: unless-stopped

  service-terminal-redis:
    image: redis:7.4-alpine
    volumes:
      - redis-terminal-data:/data
    command: redis-server --appendonly yes
    networks:
      - randco-net
    restart: unless-stopped

  service-terminal:
    image: ghcr.io/nexalabshq/rand-terminal:main
    ports:
      - "51054:51054"
    environment:
      SERVICE_NAME: service-terminal
      DATABASE_HOST: service-terminal-db
      DATABASE_PORT: 5432
      DATABASE_USER: terminal
      DATABASE_PASSWORD: ${TERMINAL_DB_PASSWORD:-terminal123}
      DATABASE_NAME: terminal_service
      DATABASE_URL: postgresql://terminal:${TERMINAL_DB_PASSWORD:-terminal123}@service-terminal-db:5432/terminal_service?sslmode=disable
      REDIS_HOST: service-terminal-redis
      REDIS_PORT: 6379
      REDIS_URL: redis://service-terminal-redis:6379/0
      SHARED_REDIS_HOST: redis-shared
      SHARED_REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      JAEGER_ENDPOINT: http://jaeger:4318
      TRACING_JAEGER_ENDPOINT: http://jaeger:4318
      SERVER_PORT: 51054
    networks:
      - randco-net
    depends_on:
      - service-terminal-db
      - service-terminal-redis
      - redis-shared
      - kafka
      - jaeger
    restart: unless-stopped

  # Payment
  service-payment-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: payment_service
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD:-payment123}
    volumes:
      - postgres-payment-data:/var/lib/postgresql/data
      - ./services/service-payment/migrations:/docker-entrypoint-initdb.d
    networks:
      - randco-net
    restart: unless-stopped

  service-payment-redis:
    image: redis:7.4-alpine
    volumes:
      - redis-payment-data:/data
    command: redis-server --appendonly yes
    networks:
      - randco-net
    restart: unless-stopped

  service-payment:
    image: ghcr.io/nexalabshq/rand-payment:main
    ports:
      - "51061:51061"
    environment:
      SERVICE_NAME: service-payment
      DATABASE_HOST: service-payment-db
      DATABASE_PORT: 5432
      DATABASE_USER: payment
      DATABASE_PASSWORD: ${PAYMENT_DB_PASSWORD:-payment123}
      DATABASE_NAME: payment_service
      DATABASE_URL: postgresql://payment:${PAYMENT_DB_PASSWORD:-payment123}@service-payment-db:5432/payment_service?sslmode=disable
      REDIS_HOST: service-payment-redis
      REDIS_PORT: 6379
      REDIS_URL: redis://service-payment-redis:6379/0
      SHARED_REDIS_HOST: redis-shared
      SHARED_REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      JAEGER_ENDPOINT: http://jaeger:4318
      TRACING_JAEGER_ENDPOINT: http://jaeger:4318
      SERVER_PORT: 51061
      PAYMENT_TEST_MODE: ${PAYMENT_TEST_MODE:-false}
      PAYMENT_DEFAULT_CURRENCY: GHS
      PAYMENT_MAX_AMOUNT: 100000000
      PAYMENT_MIN_AMOUNT: 50
      PROVIDERS_MTN_ENABLED: true
      PROVIDERS_TELECEL_ENABLED: true
      PROVIDERS_AIRTELTIGO_ENABLED: true
      PROVIDERS_BANKS_ENABLED: true
    networks:
      - randco-net
    depends_on:
      - service-payment-db
      - service-payment-redis
      - redis-shared
      - kafka
      - jaeger
    restart: unless-stopped

  # Game
  service-game-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: game_service
      POSTGRES_USER: game
      POSTGRES_PASSWORD: ${GAME_DB_PASSWORD:-game123}
    volumes:
      - postgres-game-data:/var/lib/postgresql/data
      - ./services/service-game/migrations:/docker-entrypoint-initdb.d
    networks:
      - randco-net
    restart: unless-stopped

  service-game-redis:
    image: redis:7.4-alpine
    volumes:
      - redis-game-data:/data
    command: redis-server --appendonly yes
    networks:
      - randco-net
    restart: unless-stopped

  service-game:
    image: ghcr.io/nexalabshq/rand-game:main
    ports:
      - "51053:51053"
    environment:
      SERVICE_NAME: service-game
      ENVIRONMENT: production
      SERVER_PORT: 51053
      DATABASE_URL: postgresql://game:${GAME_DB_PASSWORD:-game123}@service-game-db:5432/game_service?sslmode=disable
      DATABASE_HOST: service-game-db
      DATABASE_PORT: 5432
      DATABASE_USER: game
      DATABASE_PASSWORD: ${GAME_DB_PASSWORD:-game123}
      DATABASE_NAME: game_service
      REDIS_HOST: service-game-redis
      REDIS_PORT: 6379
      REDIS_URL: redis://service-game-redis:6379/0
      SHARED_REDIS_HOST: redis-shared
      SHARED_REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      JAEGER_ENDPOINT: http://jaeger:4318
      TRACING_JAEGER_ENDPOINT: http://jaeger:4318
      SCHEDULER_ENABLED: "true"
      SCHEDULER_INTERVAL: 1m
      SCHEDULER_WINDOW_MINUTES: 2
      SCHEDULER_TIMEZONE: UTC
      SERVICES_DRAW_HOST: service-draw
      SERVICES_DRAW_PORT: 51060
    networks:
      - randco-net
    depends_on:
      - service-game-db
      - service-game-redis
      - redis-shared
      - kafka
      - jaeger
    restart: unless-stopped

  # Draw
  service-draw-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: draw_service
      POSTGRES_USER: draw_service
      POSTGRES_PASSWORD: ${DRAW_DB_PASSWORD:-draw_service123}
    volumes:
      - postgres-draw-data:/var/lib/postgresql/data
      - ./services/service-draw/migrations:/docker-entrypoint-initdb.d
    networks:
      - randco-net
    restart: unless-stopped

  service-draw-redis:
    image: redis:7.4-alpine
    volumes:
      - redis-draw-data:/data
    command: redis-server --appendonly yes
    networks:
      - randco-net
    restart: unless-stopped

  service-draw:
    image: ghcr.io/nexalabshq/rand-draw:main
    ports:
      - "51060:51060"
    environment:
      SERVICE_NAME: service-draw
      ENVIRONMENT: production
      SERVER_PORT: 51060
      DATABASE_URL: postgresql://draw_service:${DRAW_DB_PASSWORD:-draw_service123}@service-draw-db:5432/draw_service?sslmode=disable
      DATABASE_HOST: service-draw-db
      DATABASE_PORT: 5432
      DATABASE_USER: draw_service
      DATABASE_PASSWORD: ${DRAW_DB_PASSWORD:-draw_service123}
      DATABASE_NAME: draw_service
      REDIS_HOST: service-draw-redis
      REDIS_PORT: 6379
      REDIS_URL: redis://service-draw-redis:6379/0
      SHARED_REDIS_HOST: redis-shared
      SHARED_REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      JAEGER_ENDPOINT: http://jaeger:4318
      TRACING_JAEGER_ENDPOINT: http://jaeger:4318
      GAME_SERVICE_URL: service-game:51053
      SERVICES_TICKET_HOST: service-ticket
      SERVICES_TICKET_PORT: "51062"
    networks:
      - randco-net
    depends_on:
      - service-draw-db
      - service-draw-redis
      - redis-shared
      - kafka
      - jaeger
    restart: unless-stopped

  # Ticket
  service-ticket-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ticket_service
      POSTGRES_USER: ticket
      POSTGRES_PASSWORD: ${TICKET_DB_PASSWORD:-ticket123}
    volumes:
      - postgres-ticket-data:/var/lib/postgresql/data
      - ./services/service-ticket/migrations:/docker-entrypoint-initdb.d
    networks:
      - randco-net
    restart: unless-stopped

  service-ticket-redis:
    image: redis:7.4-alpine
    volumes:
      - redis-ticket-data:/data
    command: redis-server --appendonly yes
    networks:
      - randco-net
    restart: unless-stopped

  service-ticket:
    image: ghcr.io/nexalabshq/rand-ticket:main
    ports:
      - "51062:51062"
    environment:
      SERVICE_NAME: service-ticket
      SERVER_PORT: 51062
      DATABASE_URL: postgresql://ticket:${TICKET_DB_PASSWORD:-ticket123}@service-ticket-db:5432/ticket_service?sslmode=disable
