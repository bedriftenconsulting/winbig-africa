server {
    server_name api.winbig.bedriften.xyz;

    # CORS — handle preflight at nginx level so the gateway env is not a single point of failure
    set $cors_origin "";
    if ($http_origin ~* "^https://(admin|www)?\.?winbig\.bedriften\.xyz$") {
        set $cors_origin $http_origin;
    }

    # MinIO storage proxy — serves game images
    location /storage/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }

    # OTP endpoints — phone & email verification
    location /api/v1/otp/ {
        proxy_pass http://127.0.0.1:5001/otp/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 15s;
    }

    # Featured game config — admin sets, website reads
    location /api/v1/config {
        proxy_pass http://127.0.0.1:5001/config;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    # USSD Flask app
    location /api/v1/ussd/ {
        proxy_pass http://127.0.0.1:5001/ussd/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    location / {
        # CORS headers for all responses
        if ($cors_origin != "") {
            add_header "Access-Control-Allow-Origin" $cors_origin always;
            add_header "Access-Control-Allow-Credentials" "true" always;
            add_header "Access-Control-Allow-Methods" "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header "Access-Control-Allow-Headers" "Accept, Authorization, Content-Type, X-Request-ID" always;
        }

        # Short-circuit OPTIONS preflight without hitting the backend
        if ($request_method = OPTIONS) {
            add_header "Access-Control-Allow-Origin" $cors_origin always;
            add_header "Access-Control-Allow-Credentials" "true" always;
            add_header "Access-Control-Allow-Methods" "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header "Access-Control-Allow-Headers" "Accept, Authorization, Content-Type, X-Request-ID" always;
            add_header "Access-Control-Max-Age" "86400" always;
            return 204;
        }

        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.winbig.bedriften.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.winbig.bedriften.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = api.winbig.bedriften.xyz) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name api.winbig.bedriften.xyz;
    return 404;
}
