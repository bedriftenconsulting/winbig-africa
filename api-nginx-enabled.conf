limit_req_zone $binary_remote_addr zone=ussd_callback:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_general:10m  rate=120r/m;
limit_req_zone $binary_remote_addr zone=admin_api:10m    rate=60r/m;

map $http_origin $cors_origin {
    default "";
    "https://admin.winbig.bedriften.xyz"  "https://admin.winbig.bedriften.xyz";
    "https://admin.winbig.bedriften.xyz." "https://admin.winbig.bedriften.xyz.";
    "https://winbig.bedriften.xyz"        "https://winbig.bedriften.xyz";
    "https://winbig.bedriften.xyz."       "https://winbig.bedriften.xyz.";
}

server {
    server_name api.winbig.bedriften.xyz;

    server_tokens off;

    location ^~ /hubtel/ {
        limit_req zone=api_general burst=20 nodelay;
        include snippets/security-headers.conf;
        proxy_pass http://127.0.0.1:5001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location ^~ /api/v1/ussd/ {
        limit_req zone=ussd_callback burst=10 nodelay;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Length' 0;
            return 204;
        }

        include snippets/security-headers.conf;
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        rewrite ^/api/v1(/ussd/.*)$ $1 break;
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location ^~ /api/v1/admin/tickets {
        limit_req zone=admin_api burst=20 nodelay;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Length' 0;
            return 204;
        }

        include snippets/security-headers.conf;
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        rewrite ^/api/v1(/admin/tickets.*)$ $1 break;
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location ^~ /payment/webhook {
        include snippets/security-headers.conf;
        proxy_pass http://127.0.0.1:5001/payment/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location ^~ /storage/ {
        include snippets/security-headers.conf;
        proxy_pass http://127.0.0.1:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }

    location / {
        limit_req zone=api_general burst=50 nodelay;
        include snippets/security-headers.conf;

        # Short-circuit OPTIONS preflight — never hits the backend
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Accept, Authorization, Content-Type, X-Request-ID' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Length' 0;
            return 204;
        }

        # CORS headers on all responses
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Expose-Headers' 'X-Total-Count, X-Page-Count, X-Request-ID' always;

        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;

        # Strip the restrictive CSP the Go gateway sets — it doesn't belong on API JSON responses
        proxy_hide_header Content-Security-Policy;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.winbig.bedriften.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.winbig.bedriften.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = api.winbig.bedriften.xyz) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name api.winbig.bedriften.xyz;
    return 404;
}
